<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snippet-Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface-2: #F0EEE9;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.13);
    --text: #111110;
    --text-2: #5F5E5A;
    --text-3: #888780;
    --accent: #D97706;
    --accent-bg: #FEF3C7;
    --accent-text: #92400E;
    --danger: #DC2626;
    --danger-bg: #FEE2E2;
    --logo-bg: #111110;
    --logo-fg: #ffffff;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --transition: 0.2s ease;
  }

  [data-theme="dark"] {
    --bg: #0E0E0D;
    --surface: #1A1917;
    --surface-2: #242320;
    --border: rgba(255,255,255,0.07);
    --border-md: rgba(255,255,255,0.12);
    --text: #F5F4F0;
    --text-2: #A09E97;
    --text-3: #6B6963;
    --accent: #F59E0B;
    --accent-bg: rgba(245,158,11,0.12);
    --accent-text: #FCD34D;
    --danger: #F87171;
    --danger-bg: rgba(248,113,113,0.12);
    --logo-bg: #F59E0B;
    --logo-fg: #1A1917;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ── */
  .app-wrapper { max-width: 960px; margin: 0 auto; padding: 0 1.5rem 4rem; }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 0 1.25rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.75rem;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--logo-bg);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--logo-fg);
    transition: background var(--transition), color var(--transition);
  }
  .logo-mark svg { width: 16px; height: 16px; }
  .app-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 13.5px; font-weight: 500;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-md);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    padding: 6px 13px;
    transition: background var(--transition), border-color var(--transition), transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface-2); border-color: var(--border-md); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--text);
    color: var(--bg);
    border-color: transparent;
  }
  .btn-primary:hover { opacity: 0.85; background: var(--text); }

  .btn-icon {
    padding: 6px;
    border: none;
    background: transparent;
    color: var(--text-2);
    cursor: pointer;
    border-radius: var(--radius-sm);
    display: inline-flex; align-items: center; justify-content: center;
    transition: background var(--transition), color var(--transition);
    font-size: 13px;
  }
  .btn-icon:hover { background: var(--surface-2); color: var(--text); }
  .btn-icon.danger:hover { background: var(--danger-bg); color: var(--danger); }

  .theme-btn {
    width: 34px; height: 34px;
    padding: 0;
  }

  /* ── SEARCH ── */
  .search-wrap { margin-bottom: 1.5rem; position: relative; }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-3); pointer-events: none;
    display: flex; align-items: center;
  }
  .search-input {
    width: 100%;
    padding: 10px 12px 10px 38px;
    font-family: 'Outfit', sans-serif;
    font-size: 14.5px;
    background: var(--surface);
    border: 1px solid var(--border-md);
    border-radius: var(--radius);
    color: var(--text);
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .search-input::placeholder { color: var(--text-3); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }

  /* ── COUNT BAR ── */
  .count-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
    font-size: 12.5px;
    color: var(--text-3);
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .count-pill {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 12px;
    color: var(--text-2);
  }

  /* ── GRID ── */
  .snippet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
    display: flex; flex-direction: column;
    gap: 10px;
    box-shadow: var(--shadow);
    transition: border-color var(--transition), box-shadow var(--transition), transform 0.15s;
    animation: cardIn 0.2s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:hover { border-color: var(--border-md); box-shadow: var(--shadow-md); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-title {
    font-size: 13.5px; font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    word-break: break-word;
    flex: 1;
  }
  .card-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .card-body {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--text-2);
    line-height: 1.65;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 80px;
    overflow: hidden;
    position: relative;
  }
  .card-body.expanded { max-height: none; }
  .card-fade {
    position: absolute; bottom: 0; left: 0; right: 0; height: 24px;
    background: linear-gradient(transparent, var(--surface-2));
    pointer-events: none;
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

  .copy-btn {
    flex: 1;
    justify-content: center;
    font-size: 12.5px;
    padding: 6px 10px;
  }
  .copy-btn.copied {
    background: var(--accent-bg) !important;
    color: var(--accent-text) !important;
    border-color: transparent !important;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-3);
  }
  .empty-icon {
    width: 48px; height: 48px;
    background: var(--surface-2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
  }
  .empty-state h3 { font-size: 15px; color: var(--text-2); margin-bottom: 6px; }
  .empty-state p { font-size: 13.5px; line-height: 1.6; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 1.5rem;
    animation: fadeIn 0.15s ease;
    backdrop-filter: blur(4px);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-md);
    border-radius: 14px;
    width: 100%; max-width: 480px;
    padding: 1.5rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .modal-title { font-size: 16px; font-weight: 600; }

  .form-group { margin-bottom: 1rem; }
  .form-label { font-size: 12.5px; font-weight: 500; color: var(--text-2); display: block; margin-bottom: 6px; letter-spacing: 0.02em; }
  .form-input, .form-textarea {
    width: 100%;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    background: var(--surface-2);
    border: 1px solid var(--border-md);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 9px 11px;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
    resize: vertical;
  }
  .form-textarea {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    min-height: 120px;
    line-height: 1.65;
  }
  .form-input:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; }

  /* ── TOAST ── */
  #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--text);
    color: var(--bg);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: 8px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-md);
    animation: toastIn 0.25s ease;
    white-space: nowrap;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .toast.out {
    animation: toastOut 0.25s ease forwards;
  }
  @keyframes toastOut {
    to { opacity: 0; transform: translateY(6px) scale(0.95); }
  }
  .toast-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
  .toast-dot-error { background: var(--danger); }

  /* ── STORAGE BANNER ── */
  .storage-banner {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--danger-bg);
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 1.25rem;
    font-size: 13px;
    color: var(--danger);
    line-height: 1.5;
  }
  .storage-banner svg { flex-shrink: 0; margin-top: 1px; }
  .storage-banner-msg { flex: 1; }
  .storage-banner-dismiss {
    background: none; border: none; cursor: pointer;
    color: var(--danger); font-size: 16px; line-height: 1;
    padding: 0; opacity: 0.7; flex-shrink: 0;
  }
  .storage-banner-dismiss:hover { opacity: 1; }

  /* ── FOOTER ── */
  footer {
    margin-top: 3.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 12px;
    color: var(--text-3);
    letter-spacing: 0.01em;
  }
  footer a { color: var(--text-2); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* ── RESPONSIVE ── */
  @media (max-width: 560px) {
    header { flex-wrap: wrap; gap: 10px; }
    .snippet-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none;" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Snippet</span>
      <button class="btn-icon" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label class="form-label" for="inp-title">TITLE</label>
      <input class="form-input" id="inp-title" type="text" placeholder="e.g. SSH Keygen command" autocomplete="off" />
    </div>
    <div class="form-group">
      <label class="form-label" for="inp-content">CONTENT</label>
      <textarea class="form-textarea" id="inp-content" placeholder="Paste your snippet here…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveSnippet()">Save Snippet</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app-wrapper">
  <header>
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="5" height="5" rx="1" fill="currentColor" opacity="0.9"/>
          <rect x="9" y="2" width="5" height="5" rx="1" fill="currentColor" opacity="0.55"/>
          <rect x="2" y="9" width="5" height="5" rx="1" fill="currentColor" opacity="0.55"/>
          <rect x="9" y="9" width="5" height="5" rx="1" fill="currentColor" opacity="0.28"/>
        </svg>
      </div>
      <span class="app-title">Snippet-Vault</span>
    </div>
    <div class="header-right">
      <button class="btn-icon theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></button>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Add Snippet
      </button>
    </div>
  </header>

  <div id="storage-banner" class="storage-banner" style="display:none;">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M7.5 4.5v4M7.5 10.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span class="storage-banner-msg">Private browsing or storage blocked — snippets <strong>won't be saved</strong> after you close this tab.</span>
    <button class="storage-banner-dismiss" onclick="this.parentElement.style.display='none'" title="Dismiss">&times;</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10 10.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </span>
    <input class="search-input" id="search-input" type="text" placeholder="Search snippets by title or content…" oninput="renderGrid()" autofocus />
  </div>

  <div class="count-bar">
    <span id="result-count"></span>
    <span id="total-pill" class="count-pill"></span>
  </div>

  <div class="snippet-grid" id="grid"></div>

  <footer>
    vibecoded by <a href="https://twitter.com/thedatacore" target="_blank">@thedatacore</a> &nbsp;·&nbsp; data lives in your browser
  </footer>
</div>

<script>
  /* ── STATE ── */
  const STORAGE_KEY = 'snippetvault_v1';
  let snippets = [];
  let editingId = null;

  /* ── SAFE STORAGE ── */
  const safeStorage = {
    get(key)      { try { return localStorage.getItem(key); }      catch { return null; } },
    set(key, val) { try { localStorage.setItem(key, val); return true; } catch(e) { return e; } },
    remove(key)   { try { localStorage.removeItem(key); }          catch {} }
  };

  let storageAvailable = false;
  (function detectStorage() {
    const probe = '__sv_probe__';
    const result = safeStorage.set(probe, '1');
    if (result === true) { safeStorage.remove(probe); storageAvailable = true; }
  })();

  function load() {
    try { snippets = JSON.parse(safeStorage.get(STORAGE_KEY)) || []; }
    catch { snippets = []; }
  }

  function save(rollbackTo) {
    if (!storageAvailable) return true;
    const result = safeStorage.set(STORAGE_KEY, JSON.stringify(snippets));
    if (result !== true) {
      const isQuota = result && (result.name === 'QuotaExceededError' || result.name === 'NS_ERROR_DOM_QUOTA_REACHED' || result.code === 22);
      showToast(isQuota ? 'Storage full — delete snippets to free space' : 'Save failed — storage error', 'error');
      if (rollbackTo !== undefined) { snippets = rollbackTo; renderGrid(); }
      return false;
    }
    return true;
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  /* ── THEME ── */
  const saved = safeStorage.get('sv_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const SUN_SVG  = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 1.5V3M8 13v1.5M1.5 8H3M13 8h1.5M3.2 3.2l1.1 1.1M11.7 11.7l1.1 1.1M11.7 3.2l-1.1 1.1M3.2 11.7l1.1 1.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
  const MOON_SVG = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13.5 9.5A6 6 0 016.5 2.5a6 6 0 100 11 6 6 0 007-4z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  function updateThemeIcon() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.getElementById('theme-toggle').innerHTML = dark ? SUN_SVG : MOON_SVG;
  }
  updateThemeIcon();

  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    safeStorage.set('sv_theme', next);
    updateThemeIcon();
  }

  /* ── MODAL ── */
  function openModal(id = null) {
    editingId = id;
    const modal = document.getElementById('modal');
    const titleEl = document.getElementById('inp-title');
    const contentEl = document.getElementById('inp-content');
    document.getElementById('modal-title').textContent = id ? 'Edit Snippet' : 'Add Snippet';
    document.getElementById('modal-save-btn').textContent = id ? 'Save Changes' : 'Save Snippet';
    if (id) {
      const s = snippets.find(s => s.id === id);
      titleEl.value = s.title;
      contentEl.value = s.content;
    } else {
      titleEl.value = '';
      contentEl.value = '';
    }
    modal.style.display = 'flex';
    setTimeout(() => titleEl.focus(), 50);
  }
  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    editingId = null;
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  /* ── CRUD ── */
  function saveSnippet() {
    const title = document.getElementById('inp-title').value.trim();
    const content = document.getElementById('inp-content').value.trim();
    if (!title) { document.getElementById('inp-title').focus(); return; }
    if (!content) { document.getElementById('inp-content').focus(); return; }

    const prev = snippets.map(s => ({...s}));
    if (editingId) {
      const s = snippets.find(s => s.id === editingId);
      s.title = title; s.content = content; s.updatedAt = Date.now();
    } else {
      snippets.unshift({ id: uid(), title, content, createdAt: Date.now() });
    }
    const savedOk = save(prev);
    if (!savedOk) return;
    closeModal(); renderGrid();
    showToast(editingId ? 'Snippet updated' : 'Snippet saved');
  }

  function deleteSnippet(id) {
    const prev = snippets.map(s => ({...s}));
    snippets = snippets.filter(s => s.id !== id);
    if (!save(prev)) return;
    renderGrid();
    showToast('Snippet deleted');
  }

  /* ── COPY ── */
  function copyToClipboard(text) {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise((resolve, reject) => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.cssText = 'position:absolute;left:-9999px;top:0;width:1px;height:1px;';
      document.body.appendChild(ta);
      const selection = document.getSelection();
      const prevRange = selection && selection.rangeCount > 0 ? selection.getRangeAt(0) : null;
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      let ok = false;
      try { ok = document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
      if (prevRange && selection) { selection.removeAllRanges(); selection.addRange(prevRange); }
      ok ? resolve() : reject(new Error('execCommand failed'));
    });
  }

  function copySnippet(id, btn) {
    const s = snippets.find(s => s.id === id);
    copyToClipboard(s.content).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 7l3.5 3.5L11 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = COPY_ICON + ' Copy';
      }, 1800);
      showToast('Copied to clipboard!');
    }).catch(() => showToast('Copy failed — try HTTPS or localhost', 'error'));
  }

  /* ── TOAST ── */
  function showToast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    const dotClass = type === 'error' ? 'toast-dot toast-dot-error' : 'toast-dot';
    t.innerHTML = `<span class="${dotClass}"></span>${msg}`;
    c.appendChild(t);
    setTimeout(() => {
      t.classList.add('out');
      setTimeout(() => t.remove(), 300);
    }, type === 'error' ? 3500 : 2000);
  }

  /* ── RENDER ── */
  const COPY_ICON = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="4.5" y="1" width="7.5" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="3.5" width="7.5" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3" style="fill:var(--surface)"/></svg>`;
  const EDIT_ICON = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2-7 7H2.5v-2l7-7z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>`;
  const DEL_ICON  = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.7 7.5h6.6L11 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  function renderGrid() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    const filtered = snippets.filter(s =>
      s.title.toLowerCase().includes(q) || s.content.toLowerCase().includes(q)
    );
    const grid = document.getElementById('grid');
    const countEl = document.getElementById('result-count');
    const pillEl = document.getElementById('total-pill');

    pillEl.textContent = `${snippets.length} snippet${snippets.length !== 1 ? 's' : ''}`;
    countEl.textContent = q
      ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''} for "${q}"`
      : '';

    if (filtered.length === 0) {
      grid.innerHTML = snippets.length === 0
        ? `<div class="empty-state">
            <div class="empty-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="3" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4" opacity=".5"/><rect x="3" y="11" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4" opacity=".5"/><rect x="11" y="11" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4" opacity=".25"/></svg></div>
            <h3>Your vault is empty</h3>
            <p>Add your first snippet — commands,<br/>email templates, anything you reuse.</p>
          </div>`
        : `<div class="empty-state">
            <div class="empty-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M14 14l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></div>
            <h3>No results found</h3>
            <p>Try a different search term.</p>
          </div>`;
      return;
    }

    grid.innerHTML = filtered.map(s => {
      const isLong = s.content.length > 180;
      return `<div class="card" id="card-${s.id}">
        <div class="card-header">
          <span class="card-title">${escHtml(s.title)}</span>
          <div class="card-actions">
            <button class="btn-icon" title="Edit" onclick="openModal('${s.id}')">${EDIT_ICON}</button>
            <button class="btn-icon danger" title="Delete" onclick="deleteSnippet('${s.id}')">${DEL_ICON}</button>
          </div>
        </div>
        <div class="card-body" id="body-${s.id}">${escHtml(s.content)}${isLong ? '<div class="card-fade"></div>' : ''}</div>
        <div class="card-footer">
          <button class="btn copy-btn" onclick="copySnippet('${s.id}', this)">${COPY_ICON} Copy</button>
          ${isLong ? `<button class="btn-icon" title="Expand" onclick="toggleExpand('${s.id}', this)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function toggleExpand(id, btn) {
    const body = document.getElementById(`body-${id}`);
    const isExp = body.classList.toggle('expanded');
    const fade = body.querySelector('.card-fade');
    if (fade) fade.style.display = isExp ? 'none' : 'block';
    btn.innerHTML = isExp
      ? `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 9l5-5 5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── SEED DATA ── */
  function seedIfEmpty() {
    if (snippets.length === 0) {
      snippets = [
        { id: uid(), title: 'SSH Keygen', content: 'ssh-keygen -t ed25519 -C "your@email.com"', createdAt: Date.now() },
        { id: uid(), title: 'Git: undo last commit', content: 'git reset --soft HEAD~1', createdAt: Date.now() - 1000 },
        { id: uid(), title: 'Meeting follow-up email', content: 'Hi [Name],\n\nThanks for taking the time to meet today. Here\'s a quick recap of what we discussed:\n\n- \n- \n\nNext steps: \n\nBest,\n[Your name]', createdAt: Date.now() - 2000 },
      ];
      save();
    }
  }

  /* ── INIT ── */
  load();
  seedIfEmpty();
  renderGrid();
  if (!storageAvailable) {
    document.getElementById('storage-banner').style.display = 'flex';
  }
</script>
</body>
</html>
